<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>세련 영어 익히기 ✦ Elegant English</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Playfair+Display:ital@1&display=swap');
  @font-face{
    font-family:'GmarketSansMedium';
    src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight:normal; font-display:swap;
  }
  :root{
    --navy:#1B3A5C; --gold:#D4A94A; --ivory:#FAF7F2; --ink:#243240;
    --line:#ECE5D8; --line2:#E2DACB; --muted:#8A8273; --faint:#B4AC9C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    min-height:100dvh; background:var(--ivory); color:var(--ink);
    font-family:'Noto Sans KR',system-ui,sans-serif; word-break:keep-all;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px; margin:0 auto;
    padding:max(env(safe-area-inset-top),18px) 18px calc(env(safe-area-inset-bottom) + 28px);}
  .ttl-en{font-family:'Playfair Display',serif; font-style:italic; color:var(--gold); font-size:13px;}
  .ttl-ko{font-family:'GmarketSansMedium','Noto Sans KR',sans-serif; font-weight:800; font-size:19px; color:var(--navy); margin-top:-2px;}

  header{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .stats{display:flex; gap:8px;}
  .stat{background:#fff; border:1px solid var(--line); border-radius:12px; padding:7px 12px; text-align:center; min-width:54px;}
  .stat b{display:block; font-size:15px; font-weight:800; color:var(--navy);}
  .stat span{font-size:10px; color:#9A9384;}

  .levelbar{background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:16px;}
  .levelbar .row{display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:7px;}
  .levelbar .row b{color:var(--navy);}
  .track{height:7px; background:#EFE9DC; border-radius:99px; overflow:hidden;}
  .fill{height:100%; background:linear-gradient(90deg,var(--gold),#E8C97A); border-radius:99px; transition:width .6s;}

  .tabs{display:flex; gap:8px; margin-bottom:16px;}
  .tab{flex:1; min-height:46px; border:none; border-radius:12px; cursor:pointer; font-size:13.5px; font-weight:700;
    font-family:inherit; background:#fff; color:var(--muted); box-shadow:inset 0 0 0 1px var(--line);}
  .tab.on{background:var(--navy); color:#fff; box-shadow:none;}

  .hint{text-align:center; font-size:12px; color:#A39B8A; margin-bottom:10px;}
  .badge{display:inline-block; background:#F3EEE3; color:var(--navy); font-size:11px; font-weight:700; padding:4px 11px; border-radius:99px;}

  /* flashcard */
  .scene{perspective:1000px; cursor:pointer;}
  .flip{transition:transform .5s; transform-style:preserve-3d; position:relative;}
  .flip.on{transform:rotateY(180deg);}
  .face{backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:20px; padding:24px; min-height:210px;
    display:flex; flex-direction:column; justify-content:center;}
  .front{background:#fff; border:1px solid var(--line);}
  .back{position:absolute; inset:0; transform:rotateY(180deg); background:var(--navy); color:#fff;}
  .lab{font-size:10px; letter-spacing:1.5px; font-weight:800;}
  .lab.basic{color:var(--faint); margin-top:16px;}
  .lab.pol{color:var(--gold);}
  .sent{font-size:20px; line-height:1.5; margin-top:6px; font-weight:500;}
  .back .sent{font-size:19px; font-weight:600;}
  .ko{font-size:13.5px; color:#BFD0E2; margin-top:8px;}
  .ex{font-size:12.5px; color:#A9BBD0; margin-top:4px; font-style:italic;}
  .divln{border-top:1px solid rgba(255,255,255,.15); margin:14px 0 10px;}
  .why{font-size:12.5px; line-height:1.5; color:#E7D9B6;}
  .tip{font-size:12px; color:#C2BAA9; margin-top:18px;}

  .actions{display:flex; gap:10px; margin-top:14px;}
  .btn{flex:1; min-height:54px; border-radius:14px; border:none; cursor:pointer; font-size:15px; font-weight:800; font-family:inherit;}
  .btn.solid{background:var(--gold); color:#3A2E12;}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line2);}

  /* quiz */
  .card{background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px;}
  .qsit{font-size:13px; color:var(--muted); margin:12px 0 4px;}
  .qq{font-size:15px; font-weight:700; color:var(--navy); margin-bottom:14px;}
  .opts{display:flex; flex-direction:column; gap:9px;}
  .opt{text-align:left; padding:13px 14px; border-radius:12px; font-size:14.5px; line-height:1.45; min-height:50px;
    border:1.5px solid var(--line2); background:#fff; color:var(--ink); font-weight:500; cursor:pointer; font-family:inherit;}
  .opt.correct{border-color:#7BA05B; background:#EEF3EC;}
  .opt.wrong{border-color:#C9745B; background:#FBEEEA;}
  .opt:disabled{cursor:default;}
  .explain{margin-top:14px; padding:13px; border-radius:12px; background:#FBF6EA; border:1px solid #EEDFBE; font-size:13px; line-height:1.55;}
  .explain b.ok{color:#4D6B43;} .explain b.no{color:#B25A3E;}

  .saved-item{background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px; font-size:15px; line-height:1.5;}
  .empty{text-align:center; color:#A39B8A; padding:50px 20px; font-size:14px; line-height:1.7;}
  .foot{text-align:center; margin-top:22px; font-size:11px; color:#C2BAA9;}
  .hidden{display:none;}

  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .rise{animation:rise .35s ease both;}

  @media (max-width:520px){ .ttl-ko{font-size:18px;} .sent{font-size:18px;} }
  @media (max-width:360px){ .wrap{padding-left:14px; padding-right:14px;} .stat{min-width:48px; padding:6px 9px;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="ttl-en">elegant english</div>
      <div class="ttl-ko">세련 영어 익히기</div>
    </div>
    <div class="stats">
      <div class="stat"><b id="streak">🔥0</b><span>연속</span></div>
      <div class="stat"><b id="points">0</b><span>포인트</span></div>
    </div>
  </header>

  <div class="levelbar">
    <div class="row"><span>Lv.<b id="level">1</b> · <b id="masterCount">외운 표현 0개</b></span><span id="intoTxt">0/300</span></div>
    <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-learn" onclick="setView('learn')">배우기</button>
    <button class="tab" id="tab-quiz" onclick="setView('quiz')">퀴즈</button>
    <button class="tab" id="tab-saved" onclick="setView('saved')">외운 표현</button>
  </div>

  <!-- 배우기 -->
  <div id="view-learn">
    <div class="hint" id="learnHint">카드를 탭하면 세련된 표현이 보여요 · 1/100</div>
    <div class="scene" onclick="flip()">
      <div class="flip" id="flip">
        <div class="face front">
          <span class="badge" id="cBadgeF"></span>
          <div class="lab basic">평범한 표현</div>
          <div class="sent" id="cBasic"></div>
          <div class="tip">탭해서 세련된 버전 보기 →</div>
        </div>
        <div class="face back">
          <div class="lab pol">세련된 표현 ✦</div>
          <div class="sent" id="cPol"></div>
          <div class="ko" id="cKo"></div>
          <div class="ex" id="cEx"></div>
          <div class="divln"></div>
          <div class="why" id="cWhy"></div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="nextCard(false)">다시 볼래요</button>
      <button class="btn solid" onclick="nextCard(true)">외웠어요 ✦ +10</button>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="view-quiz" class="hidden">
    <div class="card rise" id="quizCard">
      <span class="badge" id="qBadge"></span>
      <div class="qsit" id="qSit"></div>
      <div class="qq">가장 세련된 표현은?</div>
      <div class="opts" id="qOpts"></div>
      <div class="explain hidden" id="qExplain"></div>
    </div>
    <button class="btn solid" style="width:100%; margin-top:12px;" onclick="loadQuiz()">다음 문제 →</button>
  </div>

  <!-- 외운 표현 -->
  <div id="view-saved" class="hidden">
    <div id="savedList"></div>
  </div>

  <div class="foot">매일 조금씩 · 보고 익히는 세련 영어 ✦</div>
</div>

<script>
/* ── 데이터 ───────────────────────────────────── */
const SC = {
  DM:{ko:"DM 답장",emoji:"💬"}, 캡션:{ko:"인스타 캡션",emoji:"📸"},
  고객센터:{ko:"고객센터",emoji:"🛳️"}, 네트워킹:{ko:"네트워킹",emoji:"🤝"}, 연결어:{ko:"연결·전환",emoji:"🔗"}
};

const BANK = [{"sc": "DM", "basic": "Do you want to join?", "polished": "If it feels right for you, I'd love to walk you through it.", "ko": "당신에게 맞다면, 제가 차근차근 안내해 드리고 싶어요.", "ex": "No pressure at all — if it feels right for you, I'd love to walk you through it.", "why": "권유를 'I'd love to + 부드러운 조건(if it feels right)'으로 → 부담 없이 따뜻하게."}, {"sc": "DM", "basic": "Send me a message.", "polished": "Feel free to reach out anytime.", "ko": "언제든 편하게 연락 주세요.", "ex": "Feel free to reach out anytime — I'm always happy to chat.", "why": "명령형(Send me)을 'Feel free to~'로 → 압박감을 없애고 여유로운 톤."}, {"sc": "DM", "basic": "Check this link.", "polished": "Whenever you have a moment, take a look at the link.", "ko": "여유 되실 때 링크 한번 봐주세요.", "ex": "Whenever you have a moment, take a look at the link in my bio.", "why": "명령을 'Whenever you have a moment'로 → 상대의 시간을 존중하는 인상."}, {"sc": "DM", "basic": "I will tell you everything.", "polished": "I'd be happy to share the details with you.", "ko": "자세한 내용은 기꺼이 알려드릴게요.", "ex": "I'd be happy to share the details with you whenever you're ready.", "why": "'I will tell' → 'I'd be happy to share': 호의로 바꿔 더 친절하게."}, {"sc": "DM", "basic": "Thank you for your message.", "polished": "Thank you so much for taking the time to reach out.", "ko": "시간 내어 연락 주셔서 정말 감사해요.", "ex": "Thank you so much for taking the time to reach out — it means a lot.", "why": "상대의 노력(taking the time)을 짚어 진심을 전달."}, {"sc": "DM", "basic": "Do you have questions?", "polished": "If anything comes to mind, I'm here.", "ko": "궁금한 게 떠오르면 언제든 말씀하세요.", "ex": "If anything comes to mind, I'm here — no question is too small.", "why": "질문을 재촉하지 않고 'I'm here'로 곁에 있어주는 느낌."}, {"sc": "DM", "basic": "Reply to me soon.", "polished": "No rush — reply whenever it's convenient.", "ko": "급하지 않으니 편하실 때 답주세요.", "ex": "No rush — reply whenever it's convenient for you.", "why": "재촉을 'No rush'로 뒤집어 여유와 배려를 표현."}, {"sc": "DM", "basic": "I want to help you.", "polished": "I'd love to support you however I can.", "ko": "제가 할 수 있는 한 도와드리고 싶어요.", "ex": "I'd love to support you however I can along the way.", "why": "'help' 대신 'support you however I can' → 더 따뜻하고 든든한 인상."}, {"sc": "DM", "basic": "You should follow me.", "polished": "I'd be glad to have you along for the journey.", "ko": "함께 여정을 나누면 정말 기쁠 것 같아요.", "ex": "If it sounds fun, I'd be glad to have you along for the journey.", "why": "팔로우 강요 대신 '여정에 함께'라는 초대형 표현."}, {"sc": "DM", "basic": "Sorry for the late reply.", "polished": "Thank you for your patience — getting back to you now.", "ko": "기다려 주셔서 감사해요, 이제 답드릴게요.", "ex": "Thank you for your patience — getting back to you now.", "why": "사과(Sorry)를 감사(Thank you for your patience)로 → 더 품위 있게."}, {"sc": "DM", "basic": "I'm busy now, message later.", "polished": "Things are a little hectic today — may I get back to you shortly?", "ko": "오늘 좀 정신없어서요, 곧 다시 연락드려도 될까요?", "ex": "Things are a little hectic today — may I get back to you shortly?", "why": "'바쁘다' 직설 대신 완곡하게, 양해를 구하는 질문형."}, {"sc": "DM", "basic": "Let me know if you want it.", "polished": "Just say the word whenever you're ready.", "ko": "준비되시면 한마디만 주세요.", "ex": "Just say the word whenever you're ready — I'll take care of the rest.", "why": "'알려줘'를 'Just say the word'로 → 가볍고 센스 있게."}, {"sc": "DM", "basic": "It's free, try it.", "polished": "There's nothing to lose by giving it a try.", "ko": "밑져야 본전이니 한번 해보셔도 좋아요.", "ex": "Honestly, there's nothing to lose by giving it a try.", "why": "'무료'를 강조하기보다 'nothing to lose'로 부담을 덜어줌."}, {"sc": "DM", "basic": "Don't worry about it.", "polished": "Please don't give it a second thought.", "ko": "전혀 신경 쓰지 않으셔도 돼요.", "ex": "Please don't give it a second thought — it's completely fine.", "why": "'don't worry'를 'don't give it a second thought'로 → 더 세련된 위로."}, {"sc": "DM", "basic": "I'm so glad you messaged.", "polished": "It truly made my day to hear from you.", "ko": "연락 주셔서 오늘 정말 기뻤어요.", "ex": "It truly made my day to hear from you.", "why": "'기쁘다'를 'made my day'로 → 따뜻하고 자연스러운 영어 esn't quite cover it. But it's a start.", "why": "'grateful'을 강조하려고 'doesn't quite cover it'로 → 진한 여운."}, {"sc": "캡션", "basic": "Another beautiful port.", "polished": "Another port, another story to carry home.", "ko": "또 하나의 항구, 또 하나의 이야기.", "ex": "Another port, another story to carry home.", "why": "반복 구조(Another ~, another ~)로 리듬감 있는 캡션."}, {"sc": "캡션", "basic": "I'm living my dream.", "polished": "This used to be a dream. Now it's just a Tuesday.", "ko": "한때 꿈이던 것이, 이젠 그냥 화요일이에요.", "ex": "This used to be a dream. Now it's just a Tuesday.", "why": "대비(꿈 ↔ 평범한 화요일)로 임팩트 있는 반전."}, {"sc": "캡션", "basic": "Hard work pays off.", "polished": "Turns out the leap was worth it.", "ko": "결국 그 도약은 옳았어요.", "ex": "Three years and one terrifying leap later — turns out the leap was worth it.", "why": "교훈적 표현을 'the leap was worth it'로 → 개인적이고 진솔하게."}, {"sc": "캡션", "basic": "I was scared but I did it.", "polished": "I was terrified. I did it anyway.", "ko": "무서웠어요. 그래도 했어요.", "ex": "I was terrified. I did it anyway. That's the whole secret.", "why": "짧은 두 문장과 'anyway'로 용기 서사를 강렬하게."}, {"sc": "캡션", "basic": "Life is short, so travel.", "polished": "If not now, when?", "ko": "지금이 아니면, 언제일까요?", "ex": "If not now, when? See you out there.", "why": "교훈을 짧은 질문 하나로 → 강한 울림."}, {"sc": "캡션", "basic": "The sunset is amazing.", "polished": "The sky put on a show tonight.", "ko": "오늘 하늘이 한바탕 공연을 펼쳤어요.", "ex": "No filter needed — the sky put on a show tonight.", "why": "'amazing' 대신 의인화('put on a show')로 생생하게."}, {"sc": "캡션", "basic": "I feel free.", "polished": "Out here, freedom isn't a word — it's a feeling.", "ko": "여기선 자유가 단어가 아니라 감각이에요.", "ex": "Out here, freedom isn't a word — it's a feeling.", "why": "추상적 'free'를 '단어 vs 감각' 대비로 → 시적이고 세련됨."}, {"sc": "캡션", "basic": "A new adventure begins.", "polished": "And just like that, a new chapter begins.", "ko": "그렇게, 새로운 챕터가 시작돼요.", "ex": "Bags packed, heart open. And just like that, a new chapter begins.", "why": "'adventure'를 'chapter'로, 'just like that'로 자연스러운 전환."}, {"sc": "캡션", "basic": "Believe in yourself.", "polished": "The version of you waiting on the other side is worth the fear.", "ko": "두려움 너머에서 기다리는 당신은, 그 두려움만큼 값져요.", "ex": "The version of you waiting on the other side is worth the fear.", "why": "흔한 자기계발 문구를 구체적 이미지로 → 깊이 있는 동기부여."}, {"sc": "캡션", "basic": "Best decision ever.", "polished": "No regrets. Not a single one.", "ko": "후회 없어요. 단 하나도.", "ex": "Quit the safe path. No regrets. Not a single one.", "why": "'best decision'을 'No regrets. Not a single one.'으로 → 단호한 리듬."}, {"sc": "캡션", "basic": "I'm tired but happy.", "polished": "Bone-tired, heart-full.", "ko": "몸은 녹초인데, 마음은 가득해요.", "ex": "Bone-tired, heart-full. The best kind of exhausted.", "why": "대구 표현(Bone-tired, heart-full)으로 감각적이고 세련되게."}, {"sc": "캡션", "basic": "I'll remember this forever.", "polished": "Some moments you don't photograph — you just feel.", "ko": "어떤 순간은 찍지 않고, 그냥 느껴요.", "ex": "Some moments you don't photograph — you just feel.", "why": "'기억할게'를 '찍지 않고 느낀다'는 역설로 → 감성 극대화."}, {"sc": "캡션", "basic": "Follow your heart.", "polished": "Quietly, stubbornly, following my own compass.", "ko": "조용히, 고집스럽게, 내 나침반을 따라가요.", "ex": "Quietly, stubbornly, following my own compass.", "why": "진부한 'follow your heart'를 부사+은유로 → 개성 있게."}, {"sc": "캡션", "basic": "Cruising is the best.", "polished": "Home is wherever the ship is docked.", "ko": "배가 닿는 곳이 곧 집이에요.", "ex": "Home is wherever the ship is docked tonight.", "why": "최상급 'the best' 대신 '집의 정의'로 → 라이프스타일을 표현."}, {"sc": "캡션", "basic": "Thank you for following me.", "polished": "Thank you for being part of this little journey.", "ko": "이 작은 여정에 함께해 주셔서 고마워요.", "ex": "Thank you for being part of this little journey of mine.", "why": "'팔로우 감사'를 'part of this journey'로 → 관계의 따뜻함."}, {"sc": "캡션", "basic": "A slow morning today.", "polished": "A slow morning, and nowhere I have to be.", "ko": "느린 아침, 그리고 가야 할 곳도 없어요.", "ex": "A slow morning, and nowhere I have to be. Bliss.", "why": "상황을 ' /* ── 상태 ───────────────────────────────────── */
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayDiff(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let state = {points:0,streak:0,lastDate:null,mastered:[]};
try{const s=localStorage.getItem("ee_state"); if(s) state=Object.assign(state,JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem("ee_state",JSON.stringify(state));}catch(e){}}

function bump(pts){
  const t=todayStr();
  if(state.lastDate==null) state.streak=1;
  else{const d=dayDiff(state.lastDate,t); if(d===1) state.streak+=1; else if(d>1) state.streak=1;}
  state.points+=pts; state.lastDate=t; save(); renderHeader();
}
function master(p){ if(!state.mastered.includes(p)){ state.mastered.unshift(p); save(); } }

function renderHeader(){
  document.getElementById("streak").textContent="🔥"+state.streak;
  document.getElementById("points").textContent=state.points;
  const level=Math.floor(state.points/300)+1, into=state.points%300;
  document.getElementById("level").textContent=level;
  document.getElementById("masterCount").textContent="외운 표현 "+state.mastered.length+"개";
  document.getElementById("intoTxt").textContent=into+"/300";
  document.getElementById("fill").style.width=(into/300*100)+"%";
}

/* ── 뷰 전환 ───────────────────────────────────── */
function setView(v){
  ["learn","quiz","saved"].forEach(function(k){
    document.getElementById("view-"+k).classList.toggle("hidden",k!==v);
    document.getElementById("tab-"+k).classList.toggle("on",k===v);
  });
  if(v==="quiz" && !quizCur) loadQuiz();
  if(v==="saved") renderSaved();
}

/* ── 플래시카드 ───────────────────────────────────── */
let deck=shuffle(BANK.map(function(_,i){return i;})), di=0, flipped=false;
function renderCard(){
  const c=BANK[deck[di]];
  document.getElementById("flip").classList.remove("on"); flipped=false;
  document.getElementById("cBadgeF").textContent=SC[c.sc].emoji+" "+SC[c.sc].ko;
  document.getElementById("cBasic").textContent='"'+c.basic+'"';
  document.getElementById("cPol").textContent='"'+c.polished+'"';
  document.getElementById("cKo").textContent=c.ko;
  document.getElementById("cEx").textContent='예) "'+c.ex+'"';
  document.getElementById("cWhy").textContent="💡 "+c.why;
  document.getElementById("learnHint").textContent="카드를 탭하면 세련된 표현이 보여요 · "+(di+1)+"/"+deck.length;
}
function flip(){flipped=!flipped; document.getElementById("flip").classList.toggle("on",flipped);}
function nextCard(learned){
  if(learned){ master(BANK[deck[di]].polished); bump(10); }
  di++; if(di>=deck.length){ deck=shuffle(BANK.map(function(_,i){return i;})); di=0; }
  renderCard();
}

/* ── 퀴즈 ───────────────────────────────────── */
let quizDeck=shuffle(QUIZ.map(function(_,i){return i;})), qi=0, quizCur=null, answered=false;
function loadQuiz(){
  qi++; if(qi>=quizDeck.length){ quizDeck=shuffle(QUIZ.map(function(_,i){return i;})); qi=0; }
  quizCur=QUIZ[quizDeck[qi]]; answered=false;
  document.getElementById("qBadge").textContent=SC[quizCur.sc].emoji+" "+SC[quizCur.sc].ko;
  document.getElementById("qSit").textContent="상황 · "+quizCur.situation;
  const ex=document.getElementById("qExplain"); ex.classList.add("hidden");
  const box=document.getElementById("qOpts"); box.innerHTML="";
  quizCur.options.forEach(function(op,i){
    const b=document.createElement("button");
    b.className="opt"; b.textContent=op;
    b.onclick=function(){pick(i,b);};
    box.appendChild(b);
  });
  document.getElementById("quizCard").classList.remove("rise"); void document.getElementById("quizCard").offsetWidth;
  document.getElementById("quizCard").classList.add("rise");
}
function pick(i,btn){
  if(answered) return; answered=true;
  const opts=document.getElementById("qOpts").children;
  for(let k=0;k<opts.length;k++){ opts[k].disabled=true;
    if(k===quizCur.correct) opts[k].classList.add("correct");
    if(k===i && i!==quizCur.correct) opts[k].classList.add("wrong");
  }
  if(i===quizCur.correct){ opts[i].textContent="✓ "+opts[i].textContent; }
  else { opts[i].textContent="✗ "+opts[i].textContent; opts[quizCur.correct].textContent="✓ "+opts[quizCur.correct].textContent; }
  const ok=i===quizCur.correct;
  bump(ok?20:5);
  const ex=document.getElementById("qExplain");
  ex.innerHTML='<b class="'+(ok?"ok":"no")+'">'+(ok?"정답이에요! +20":"아쉬워요 +5")+'</b><br>💡 '+quizCur.why;
  ex.classList.remove("hidden");
}

/* ── 외운 표현 ───────────────────────────────────── */
function renderSaved(){
  const box=document.getElementById("savedList");
  if(state.mastered.length===0){ box.innerHTML='<div class="empty">아직 외운 표현이 없어요.<br>배우기에서 "외웠어요"를 누르면<br>여기에 모여요 ✦</div>'; return; }
  box.innerHTML=state.mastered.map(function(p){return '<div class="saved-item">✦ "'+p.replace(/"/g,'&quot;')+'"</div>';}).join("");
}

/* ── 시작 ───────────────────────────────────── */
renderHeader(); renderCard();
</script>
